[gcode_macro PAUSE]
rename_existing: PAUSE_BASE
gcode:
   {% set X = params.X|default(120)|int %}
   {% set Y = params.Y|default(120)|int %}
   {% set Z = params.Z|default(10)|int %}
   {% set E = params.E|default(1)|int %}
   SAVE_GCODE_STATE NAME=PAUSE_state
   PAUSE_BASE
   G91
   G1 E-{E} F2100
   G1 Z{Z}
   G90
   G1 X{X} Y{Y} F6000
   LED_STATUS_ORANGE
