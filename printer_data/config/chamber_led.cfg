[gcode_macro LED_ON]
gcode:  SET_PIN PIN=caselight VALUE=1

[gcode_macro LED_OFF]
gcode:  SET_PIN PIN=caselight VALUE=0

[gcode_macro TOGGLE_LED]
gcode:
    {% if printer['output_pin caselight'].value > 0 %}
      SET_PIN PIN=caselight VALUE=0
    {% else %}
      SET_PIN PIN=caselight VALUE=1
    {% endif %}
